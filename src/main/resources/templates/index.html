<!DOCTYPE html>
<html class="light" lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Login | Curador Digital</title>

        <th:block th:insert="~{fragments/common-head :: headCommon}" />
        <th:block th:insert="~{fragments/tailwind-config :: script}" />
        <script
            src="https://cdn.tailwindcss.com?plugins=forms,container-queries"
        ></script>
    </head>

    <body class="bg-surface text-on-surface min-h-screen flex flex-col">
        <th:block
            th:replace="~{fragments/header :: header('Curador Digital', 'Buscar...')}"
        ></th:block>
        <main class="flex-grow flex items-center justify-center pt-24 pb-12">
            <div class="container mx-auto px-6 max-w-5xl">
                <div
                    class="grid grid-cols-1 md:grid-cols-12 shadow-2xl rounded-2xl overflow-hidden bg-white"
                >
                    <div
                        class="md:col-span-5 relative bg-primary p-12 flex flex-col justify-between text-white"
                    >
                        <div class="relative z-10">
                            <h1 class="text-4xl font-extrabold mb-4">Login</h1>
                            <p
                                class="text-primary-container text-lg leading-relaxed opacity-90"
                            >
                                Acesse o painel administrativo da biblioteca
                                para gerenciar o acervo e usuários.
                            </p>
                        </div>
                        <div class="relative z-10">
                            <div
                                class="w-12 h-1 bg-primary-container rounded-full mb-4"
                            >
                            </div>
                            <p
                                class="text-xs uppercase tracking-widest opacity-70"
                            >
                                Sistemas UMC
                            </p>
                        </div>
                    </div>

                    <div class="md:col-span-7 p-8 md:p-16">
                        <div class="max-w-sm mx-auto">
                            <h2 class="text-2xl font-bold mb-8 text-slate-800">
                                Acesse sua conta
                            </h2>

                            <div
                                th:if="${param.error}"
                                class="mb-4 p-3 bg-red-100 text-red-700 text-sm rounded-lg"
                            >
                                E-mail ou senha incorretos.
                            </div>

                            <form
                                th:action="@{/api/auth/login}"
                                method="POST"
                                class="space-y-6"
                            >
                                <div class="space-y-2">
                                    <label
                                        class="block text-sm font-semibold text-slate-600"
                                        for="username"
                                    >E-mail Administrativo</label>
                                    <input
                                        type="email"
                                        id="username"
                                        name="username"
                                        class="w-full bg-slate-50 border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all"
                                        placeholder="exemplo@umc.br"
                                        required
                                    />
                                </div>

                                <div class="space-y-2">
                                    <div class="flex justify-between">
                                        <label
                                            class="block text-sm font-semibold text-slate-600"
                                            for="password"
                                        >Senha</label>
                                        <a
                                            href="#"
                                            class="text-xs text-primary hover:underline"
                                        >Esqueceu a senha?</a>
                                    </div>
                                    <input
                                        type="password"
                                        id="password"
                                        name="password"
                                        class="w-full bg-slate-50 border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all"
                                        placeholder="••••••••"
                                        required
                                    />
                                </div>

                                <div class="flex items-center gap-2">
                                    <input
                                        type="checkbox"
                                        id="remember"
                                        class="rounded border-slate-300 text-primary focus:ring-primary"
                                    />
                                    <label
                                        for="remember"
                                        class="text-sm text-slate-500"
                                    >Lembrar neste dispositivo</label>
                                </div>

                                <div class="pt-4 space-y-3">
                                    <button
                                        type="submit"
                                        class="w-full bg-primary hover:bg-primary-dim text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95"
                                    >
                                        Acessar Sistema
                                    </button>
                                    <button
                                        type="button"
                                        class="w-full border border-slate-200 text-slate-600 font-semibold py-4 rounded-xl hover:bg-slate-50 transition-colors"
                                    >
                                        Solicitar Acesso
                                    </button>
                                </div>
                            </form>

                            <div class="mt-8 text-center">
                                <p class="text-xs text-slate-400">
                                    © 2026 Curador Digital. Uso restrito a
                                    funcionários e alunos autorizados.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="w-full py-6 bg-white border-t border-slate-100">
            <div
                class="max-w-7xl mx-auto px-12 flex justify-between items-center text-slate-400 text-sm"
            >
                <p>Universidade Mogi das Cruzes</p>
                <div class="flex gap-6">
                    <a href="#" class="hover:text-primary">Privacidade</a>
                    <a href="#" class="hover:text-primary">Ajuda</a>
                </div>
            </div>
        </footer>
    </body>
</html>
