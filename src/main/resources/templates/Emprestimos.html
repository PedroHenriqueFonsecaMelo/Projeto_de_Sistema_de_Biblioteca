<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
    <head>
        <th:block th:insert="~{fragments/common-head :: headCommon}" />
        <title>Gestão de Empréstimos - Curador Digital</title>
    </head>
    <body class="bg-surface text-on-surface flex min-h-screen">
        <div
            th:replace="~{fragments/sidebar :: sidebar(activePage='emprestimos')}"
        >
        </div>

        <main
            class="ml-64 flex-1 flex flex-col min-h-screen relative bg-surface overflow-y-auto"
        >
            <th:block
                th:replace="~{fragments/header :: header('Gestão de Empréstimos', 'Filtrar livros ou leitores...')}"
            ></th:block>

            <div class="p-8 mt-16 max-w-7xl mx-auto w-full">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h1 class="text-3xl font-black text-on-surface">
                            Circulação
                        </h1>
                        <p class="text-on-surface-variant font-medium">
                            Controle de saídas, retornos e prazos.
                        </p>
                    </div>
                    <button
                        onclick="openModal('loanModal', 'loanModalContent')"
                        class="bg-[#2d333a] text-white px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-black shadow-lg transition-all active:scale-95"
                    >
                        <span class="material-symbols-outlined text-sm"
                        >add</span>
                        Novo Empréstimo
                    </button>
                </div>

                <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
                    <section class="xl:col-span-5 space-y-6">
                        <div class="flex items-center justify-between">
                            <h2
                                class="text-xl font-bold text-error flex items-center gap-2"
                            >
                                <span class="material-symbols-outlined"
                                >warning</span>
                                Painel de Retorno de Livros Atrasados
                            </h2>
                        </div>

                        <div
                            class="bg-white rounded-3xl p-6 border-2 border-error/10 shadow-sm min-h-[200px]"
                        >
                            <div
                                th:if="${#lists.isEmpty(emprestimosAtrasados)}"
                                class="flex flex-col items-center justify-center py-12 opacity-50 text-center"
                            >
                                <span
                                    class="material-symbols-outlined text-5xl text-success/60"
                                >verified_user</span>
                                <p
                                    class="text-on-surface-variant text-sm mt-3 font-semibold"
                                >
                                    Tudo em dia!
                                </p>
                            </div>

                            <div
                                th:each="atrasado : ${emprestimosAtrasados}"
                                class="mb-6 last:mb-0 bg-error/5 p-5 rounded-2xl border border-error/10"
                            >
                                <div
                                    class="flex justify-between items-start mb-4"
                                >
                                    <div class="min-w-0 flex-1">
                                        <h3
                                            class="text-md font-extrabold text-on-surface truncate"
                                            th:text="${livros.?[id == #root.atrasado.bookId][0]?.titulo ?: 'Livro...'}"
                                        >
                                        </h3>
                                        <p
                                            class="text-xs text-on-surface-variant mt-1"
                                        >
                                            Solicitante: <span
                                                class="font-bold"
                                                th:text="${userNameMap[atrasado.leitorId]}"
                                            ></span>
                                        </p>
                                    </div>
                                </div>
                                <button
                                    type="button"
                                    th:data-id="${atrasado.id}"
                                    onclick="emprestimos_devolver(this.getAttribute('data-id'))"
                                    class="w-full py-3 bg-on-surface text-surface font-bold rounded-xl hover:opacity-90 active:scale-[0.98] transition-all text-[10px] uppercase tracking-widest"
                                >
                                    Quitar e Devolver
                                </button>
                            </div>
                        </div>
                    </section>

                    <section class="xl:col-span-7 space-y-6">
                        <div class="flex items-center justify-between">
                            <h2
                                class="text-xl font-bold text-on-surface flex items-center gap-2"
                            >
                                <span
                                    class="material-symbols-outlined text-primary"
                                >inventory_2</span>
                                Em Uso Geral
                            </h2>
                        </div>

                        <div class="space-y-3">
                            <div
                                th:each="emprestimo : ${emprestimosAtivos}"
                                class="bg-white p-4 rounded-2xl flex gap-5 items-center hover:shadow-md border border-outline-variant/10 transition-all"
                            >
                                <div class="flex-grow min-w-0">
                                    <h3
                                        class="text-sm font-bold text-on-surface truncate"
                                        th:text="${livros.?[id == #root.emprestimo.bookId][0]?.titulo}"
                                    >
                                    </h3>
                                    <p
                                        class="text-[11px] text-on-surface-variant mt-1"
                                        th:text="${userNameMap[emprestimo.leitorId]}"
                                    >
                                    </p>
                                    <p
                                        class="text-[10px] text-primary font-black mt-1 uppercase"
                                    >
                                        Vence em: <span
                                            th:text="${#temporals.format(emprestimo.dataVencimento, 'dd/MM/yyyy')}"
                                        ></span>
                                    </p>
                                </div>

                                <div class="flex items-center gap-2">
                                    <button
                                        type="button"
                                        th:data-id="${emprestimo.id}"
                                        onclick="emprestimos_renovar(this.getAttribute('data-id'))"
                                        class="w-10 h-10 flex items-center justify-center text-primary hover:bg-primary/5 rounded-full"
                                        title="Renovar Prazo"
                                    >
                                        <span class="material-symbols-outlined"
                                        >update</span>
                                    </button>

                                    <button
                                        type="button"
                                        th:data-id="${emprestimo.id}"
                                        onclick="emprestimos_devolver(this.getAttribute('data-id'))"
                                        class="w-10 h-10 flex items-center justify-center text-outline hover:text-success hover:bg-success/5 rounded-full"
                                        title="Devolver Agora"
                                    >
                                        <span class="material-symbols-outlined"
                                        >assignment_return</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>

        <div
            id="loanModal"
            class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm"
        >
            <div
                id="loanModalContent"
                class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden transform transition-all scale-95 opacity-0"
            >
                <div class="p-8">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-extrabold text-on-surface">
                            Novo Registro
                        </h2>
                        <button
                            onclick="closeModal('loanModal', 'loanModalContent')"
                            class="p-2 hover:bg-surface-container rounded-full"
                        >
                            <span class="material-symbols-outlined">close</span>
                        </button>
                    </div>
                    <form
                        onsubmit="event.preventDefault(); emprestimos_salvar(this);"
                        class="space-y-4"
                    >
                        <div>
                            <label
                                class="block text-xs font-bold uppercase text-outline mb-2"
                            >Livro</label>
                            <select
                                name="bookId"
                                required
                                class="w-full rounded-xl border-outline-variant bg-surface-container-low py-3 px-4 text-sm"
                            >
                                <option value="" disabled selected>
                                    Selecione um título...
                                </option>
                                <option
                                    th:each="l : ${livros}"
                                    th:value="${l.id}"
                                    th:text="${l.titulo}"
                                >
                                </option>
                            </select>
                        </div>
                        <div>
                            <label
                                class="block text-xs font-bold uppercase text-outline mb-2"
                            >Leitor</label>
                            <select
                                name="leitorId"
                                required
                                class="w-full rounded-xl border-outline-variant bg-surface-container-low py-3 px-4 text-sm"
                            >
                                <option value="" disabled selected>
                                    Selecione o leitor...
                                </option>
                                <option
                                    th:each="u : ${usuarios}"
                                    th:value="${u.id}"
                                    th:text="${u.nome}"
                                >
                                </option>
                            </select>
                        </div>
                        <input
                            type="hidden"
                            name="bibliotecarioId"
                            th:value="${#authentication.name}"
                        />
                        <div class="pt-4 flex gap-3">
                            <button
                                type="button"
                                onclick="closeModal('loanModal', 'loanModalContent')"
                                class="flex-1 px-5 py-3 font-bold text-on-surface-variant"
                            >
                                Cancelar
                            </button>
                            <button
                                type="submit"
                                class="flex-1 px-5 py-3 bg-primary text-white font-bold rounded-xl"
                            >
                                Confirmar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <th:block th:insert="~{fragments/common-js :: commonJs}" />
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const inputVenc = document.getElementById("dataVencimento");
                if (inputVenc) {
                    const d = new Date();
                    d.setDate(d.getDate() + 14);
                    inputVenc.value = d.toISOString().split("T")[0];
                }
            });
        </script>
    </body>
</html>
