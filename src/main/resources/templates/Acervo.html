<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>Acervo - The Digital Curator</title>
        <script
            src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Public+Sans:wght@300;400;500;600&display=swap"
            rel="stylesheet" />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
            rel="stylesheet" />

        <script th:replace="~{fragments/tailwind-config :: script}"></script>

        <style>
        .material-symbols-outlined { vertical-align: middle; }
        body { font-family: 'Public Sans', sans-serif; background-color: #f8f9fe; }
        .sidebar-item-active { background-color: #abd3fd !important; color: #3a6287 !important; font-weight: 700 !important; border-radius: 0 1.5rem 1.5rem 0; }
    </style>
    </head>

    <body class="flex min-h-screen">

        <div
            th:replace="~{fragments/sidebar :: sidebar(activePage='acervo')}"></div>

        <main class="ml-64 flex-1 flex flex-col min-h-screen">

            <header
                class="fixed top-0 left-64 right-0 z-30 bg-slate-50/80 backdrop-blur-md flex justify-between items-center px-8 py-3 shadow-sm">
                <div class="flex items-center gap-8 flex-1">
                    <h2
                        class="font-['Manrope'] font-bold tracking-tight text-xl text-slate-900">Acervo</h2>
                    <div class="relative w-full max-w-md">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                        <input
                            class="w-full bg-white border border-slate-200 rounded-full py-2 pl-10 pr-4 text-sm focus:ring-2 focus:ring-primary/20 outline-none"
                            placeholder="Buscar títulos, autores ou ISBN..."
                            type="text" />
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button
                        class="p-2 text-slate-500 hover:bg-blue-50 rounded-full transition-colors"><span
                            class="material-symbols-outlined">notifications</span></button>
                    <div class="h-8 w-[1px] bg-slate-200 mx-2"></div>
                    <div class="flex items-center gap-3">
                        <div
                            class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white font-bold text-xs">AD</div>
                        <span
                            class="text-sm font-medium text-on-surface">Admin</span>
                    </div>
                </div>
            </header>

            <div class="mt-16 p-8 flex flex-col gap-8">

                <section
                    class="flex flex-col md:flex-row justify-between items-end gap-6">
                    <div class="max-w-2xl">
                        <h3
                            class="font-['Manrope'] text-3xl font-extrabold text-primary mb-2">Coleção
                            de Inverno 2026</h3>
                        <p
                            class="text-on-surface-variant leading-relaxed">Gerencie
                            o catálogo completo da biblioteca. Utilize os
                            filtros avançados para localizar edições
                            específicas.</p>
                    </div>
                    <div class="flex gap-3">
                        <button
                            class="flex items-center gap-2 px-5 py-2.5 rounded-xl border border-slate-200 text-secondary font-medium hover:bg-white transition-colors">
                            <span
                                class="material-symbols-outlined">file_download</span>
                            Exportar CSV
                        </button>
                        <button
                            class="flex items-center gap-2 px-5 py-2.5 rounded-xl bg-primary text-on-primary font-medium shadow-lg hover:opacity-90 transition-all">
                            <span class="material-symbols-outlined">add</span>
                            Novo Livro
                        </button>
                    </div>
                </section>

                <section
                    class="bg-white p-6 rounded-xl shadow-sm flex flex-wrap items-center gap-8">
                    <div class="flex flex-col gap-1.5">
                        <label
                            class="text-[10px] uppercase font-bold tracking-widest text-slate-400">Categoria</label>
                        <div class="flex gap-2">
                            <button
                                class="px-4 py-1.5 bg-primary text-white rounded-lg text-sm font-medium">Todos</button>
                            <button
                                class="px-4 py-1.5 text-slate-600 hover:bg-slate-100 rounded-lg text-sm transition-colors">Ficção</button>
                            <button
                                class="px-4 py-1.5 text-slate-600 hover:bg-slate-100 rounded-lg text-sm transition-colors">Técnico</button>
                        </div>
                    </div>
                    <div
                        class="h-10 w-[1px] bg-slate-100 hidden lg:block"></div>
                    <div class="flex flex-col gap-1.5 flex-1 min-w-[200px]">
                        <label
                            class="text-[10px] uppercase font-bold tracking-widest text-slate-400">Autor</label>
                        <input
                            class="w-full bg-slate-50 border-none rounded-lg py-1.5 px-3 text-sm focus:ring-1 focus:ring-primary/40"
                            placeholder="Filtrar por autor..." type="text" />
                    </div>
                </section>

                <section
                    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">

                    <div th:each="livro : ${livros}"
                        class="group flex flex-col bg-white rounded-xl overflow-hidden transition-all duration-300 hover:-translate-y-1 shadow-sm border border-slate-100">
                        <div
                            class="aspect-[2/3] overflow-hidden relative bg-slate-200">
                            <img th:src="${livro.capaUrl}"
                                th:alt="${livro.titulo}"
                                class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" />

                            <div class="absolute top-4 right-4">
                                <span th:text="${livro.status}"
                                    class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider shadow-sm"
                                    th:classappend="${livro.status == 'Disponível' ? 'bg-emerald-100 text-emerald-700' : 
                                                  (livro.status == 'Emprestado' ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-600')}">
                                    Status
                                </span>
                            </div>
                        </div>

                        <div class="p-6 flex flex-col gap-2">
                            <p
                                class="text-[10px] uppercase font-bold tracking-widest text-slate-400"
                                th:text="${livro.isbn}">ISBN</p>
                            <h4
                                class="font-['Manrope'] font-bold text-on-surface text-lg leading-snug"
                                th:text="${livro.titulo}">Título</h4>
                            <p class="text-on-surface-variant text-sm"
                                th:text="${livro.autor}">Autor</p>

                            <div
                                class="mt-4 pt-4 border-t border-slate-50 flex justify-between items-center">
                                <span class="text-[11px] font-medium"
                                    th:text="${livro.localizacao}"
                                    th:classappend="${livro.status == 'Disponível' ? 'text-primary' : 'text-slate-400'}">
                                    Localização
                                </span>
                                <button
                                    class="p-1.5 text-slate-400 hover:text-primary transition-colors">
                                    <span
                                        class="material-symbols-outlined text-xl">more_vert</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </section>

                <footer
                    class="mt-8 flex items-center justify-between py-6 border-t border-slate-100">
                    <p class="text-sm text-slate-500">Exibindo <span
                            class="font-semibold text-slate-900"
                            th:text="${livros.size()}">5</span> títulos</p>
                    <div class="flex items-center gap-1">
                        <button
                            class="p-2 text-slate-400 hover:bg-white rounded-lg"><span
                                class="material-symbols-outlined">chevron_left</span></button>
                        <button
                            class="w-10 h-10 bg-primary text-white rounded-lg font-bold text-sm">1</button>
                        <button
                            class="p-2 text-slate-400 hover:bg-white rounded-lg"><span
                                class="material-symbols-outlined">chevron_right</span></button>
                    </div>
                </footer>
            </div>
        </main>
    </body>
</html>
