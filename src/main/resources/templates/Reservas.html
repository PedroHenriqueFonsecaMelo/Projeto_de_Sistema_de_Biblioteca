<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
    <head>
        <th:block th:insert="~{fragments/common-head :: headCommon}" />
        <title>Reservas - Curador Digital</title>
    </head>
    <body class="bg-surface text-on-surface flex min-h-screen">
        <div
            th:replace="~{fragments/sidebar :: sidebar(activePage='reservas')}"
        >
        </div>

        <main
            class="ml-64 flex-1 flex flex-col min-h-screen relative bg-surface overflow-y-auto"
        >
            <th:block
                th:replace="~{fragments/header :: header('Reservas', 'Buscar...')}"
            ></th:block>

            <div class="p-8 mt-16 max-w-6xl mx-auto w-full space-y-8">
                <section
                    class="bg-white rounded-xl p-8 shadow-sm border border-outline-variant/10"
                >
                    <div
                        class="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 gap-6"
                    >
                        <div>
                            <h2
                                class="text-3xl font-extrabold text-on-surface tracking-tight"
                            >
                                Reservas
                            </h2>
                            <p
                                class="text-on-surface-variant text-sm font-light"
                            >
                                Gerencie a fila de espera e retiradas.
                            </p>
                        </div>

                        <div class="relative w-full md:w-72">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg"
                            >search</span>
                            <input
                                type="text"
                                id="searchInput"
                                placeholder="Filtrar reservas..."
                                class="w-full pl-10 pr-4 py-2.5 text-sm rounded-xl border border-outline-variant bg-surface outline-none"
                            >
                        </div>

                        <button
                            type="button"
                            onclick="reservas_openReservationModal()"
                            class="bg-[#2d333a] text-white px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-black shadow-lg transition-all active:scale-95"
                        >
                            <span class="material-symbols-outlined text-sm"
                            >add</span> Nova Reserva
                        </button>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                        <div class="lg:col-span-4">
                            <h3
                                class="text-[11px] font-bold uppercase tracking-[0.2em] text-outline mb-5"
                            >
                                Livros Solicitados
                            </h3>
                            <div
                                class="space-y-2 overflow-y-auto pr-2 custom-scrollbar max-h-[550px]"
                            >
                                <div
                                    th:each="livro : ${livros}"
                                    class="bg-surface-container-low p-3 rounded-xl flex items-center gap-3 border border-transparent shadow-sm"
                                >
                                    <div
                                        class="w-9 h-11 bg-secondary-container rounded flex items-center justify-center text-primary shrink-0"
                                    >
                                        <span
                                            class="material-symbols-outlined text-sm"
                                        >book</span>
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <p
                                            class="font-bold text-on-surface text-[13px] truncate"
                                            th:text="${livro?.titulo ?: 'Título Indisponível'}"
                                        >
                                            Título
                                        </p>
                                        <p
                                            class="text-[9px] text-outline font-bold uppercase"
                                            th:text="${livro?.isbn ?: 'N/A'}"
                                        >
                                            ISBN
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="lg:col-span-8">
                            <h3
                                class="text-[11px] font-bold uppercase tracking-[0.2em] text-outline mb-5"
                            >
                                Fila de Espera Ativa
                            </h3>
                            <div
                                class="space-y-3 overflow-y-auto pr-2 custom-scrollbar max-h-[550px]"
                            >
                                <div
                                    th:each="reserva, iter : ${reservas}"
                                    class="reserva-item flex items-center justify-between p-4 rounded-xl bg-surface-container-low border border-transparent shadow-sm"
                                >
                                    <div class="flex items-center gap-4">
                                        <div
                                            class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-black text-[10px] shrink-0"
                                        >
                                            <span
                                                th:text="${reserva.posicaoNaFila != null ? reserva.posicaoNaFila : iter.count}"
                                            >1</span>
                                        </div>
                                        <div class="flex flex-col min-w-0">
                                            <p
                                                class="font-bold text-on-surface text-sm leading-tight mb-0.5"
                                                th:text="${reserva.usuarioNome ?: 'Usuário não vinculado'}"
                                            >
                                            </p>
                                            <div
                                                class="flex items-center gap-1.5"
                                            >
                                                <span
                                                    class="material-symbols-outlined text-[12px] text-primary font-bold"
                                                >bookmark</span>
                                                <p
                                                    class="text-[11px] text-primary font-extrabold uppercase truncate"
                                                    th:text="${reserva.livroTitulo ?: 'Livro não vinculado'}"
                                                >
                                                </p>
                                            </div>
                                        </div>
                                    </div>

                                    <div
                                        class="flex items-center gap-2 shrink-0 ml-4"
                                    >
                                        <form
                                            th:action="@{/library/reservas/liberar}"
                                            method="POST"
                                            class="inline"
                                        >
                                            <input
                                                type="hidden"
                                                name="reservaId"
                                                th:value="${reserva.id}"
                                            />
                                            <button
                                                type="submit"
                                                class="p-2 text-primary hover:bg-primary/10 rounded-lg group"
                                            >
                                                <span
                                                    class="material-symbols-outlined group-hover:scale-110 transition-transform"
                                                >check_circle</span>
                                            </button>
                                        </form>

                                        <button
                                            type="button"
                                            th:data-id="${reserva.id}"
                                            onclick="reservas_handleDelete(this)"
                                            class="p-2 text-outline hover:text-error rounded-lg group"
                                        >
                                            <span
                                                class="material-symbols-outlined group-hover:scale-110 transition-transform"
                                            >delete</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <div
                id="reservaModal"
                class="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 hidden"
            >
                <div
                    id="modalContent"
                    class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl transform transition-all scale-95 opacity-0"
                >
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold text-on-surface">
                            Nova Reserva
                        </h3>
                        <button
                            type="button"
                            onclick="reservas_closeReservationModal()"
                            class="text-outline hover:text-on-surface"
                        >
                            <span class="material-symbols-outlined">close</span>
                        </button>
                    </div>

                    <form
                        th:action="@{/library/reservas/reservar}"
                        method="POST"
                        class="space-y-4"
                    >
                        <div class="space-y-1">
                            <label
                                class="text-[10px] font-bold uppercase tracking-widest text-outline ml-1"
                            >Leitor</label>
                            <select
                                name="leitorId"
                                required
                                class="w-full p-3 rounded-xl border border-outline-variant bg-surface outline-none text-sm"
                            >
                                <option value="" disabled selected>
                                    Selecione um leitor...
                                </option>
                                <option
                                    th:each="user : ${usuarios}"
                                    th:value="${user.id}"
                                    th:text="${user.nome}"
                                >
                                </option>
                            </select>
                        </div>

                        <div class="space-y-1">
                            <label
                                class="text-[10px] font-bold uppercase tracking-widest text-outline ml-1"
                            >Livro</label>
                            <select
                                name="bookId"
                                required
                                class="w-full p-3 rounded-xl border border-outline-variant bg-surface outline-none text-sm"
                            >
                                <option value="" disabled selected>
                                    Selecione um livro...
                                </option>
                                <option
                                    th:each="book : ${livros}"
                                    th:value="${book.id}"
                                    th:text="${book.titulo}"
                                >
                                </option>
                            </select>
                        </div>

                        <button
                            type="submit"
                            class="w-full bg-primary text-white py-3 rounded-xl font-bold shadow-lg hover:brightness-110 transition-all"
                        >
                            Confirmar Reserva
                        </button>
                    </form>
                </div>
            </div>
        </main>

        <th:block th:insert="~{fragments/common-js :: commonJs}" />

        <script th:inline="javascript">
            // Função para capturar o clique e pegar o ID do atributo data-id
            window.reservas_handleDelete = function (button) {
                const id = button.getAttribute("data-id");
                if (id) {
                    window.reservas_confirmDelete(id);
                }
            };

            window.reservas_confirmDelete = function (id) {
                if (confirm("Deseja realmente cancelar esta reserva?")) {
                    window.location.href = "/library/reservas/deletar/" + id;
                }
            };

            window.reservas_openReservationModal = function () {
                const modal = document.getElementById("reservaModal");
                const content = document.getElementById("modalContent");
                if (modal && content) {
                    modal.classList.remove("hidden");
                    setTimeout(() => {
                        content.classList.remove("scale-95", "opacity-0");
                        content.classList.add("scale-100", "opacity-100");
                    }, 10);
                    document.body.classList.add("modal-active");
                }
            };

            window.reservas_closeReservationModal = function () {
                const modal = document.getElementById("reservaModal");
                const content = document.getElementById("modalContent");
                if (modal && content) {
                    content.classList.remove("scale-100", "opacity-100");
                    content.classList.add("scale-95", "opacity-0");
                    setTimeout(() => modal.classList.add("hidden"), 300);
                    document.body.classList.remove("modal-active");
                }
            };
        </script>
    </body>
</html>
